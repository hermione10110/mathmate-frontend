<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathmate AI ✨📒</title>

<!-- TailwindCSS -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- MathJax -->
<script>
window.MathJax = {
  tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
  svg: { fontCache: 'global' }
};
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
body { font-family:'Pretendard',sans-serif; background:#fdf6f0; }
header { background:linear-gradient(135deg,#ffe9e5,#fef5f2); border-bottom:2px solid #d6336c; padding:1rem; text-align:center; font-family:'Playfair Display', serif; font-weight:700; }
#chat::-webkit-scrollbar{width:5px;} #chat::-webkit-scrollbar-thumb{background:#d6336c;border-radius:10px;}
.user-bubble{background:linear-gradient(135deg,#d6336c,#f783ac); color:white; padding:12px 16px; border-radius:24px 24px 6px 24px; max-width:75%; box-shadow:0 6px 15px rgba(244,114,182,0.3);}
.ai-bubble{background:rgba(255,255,255,0.9);backdrop-filter:blur(15px);padding:16px 20px;border-radius:24px 24px 24px 6px;max-width:75%;box-shadow:0 8px 25px rgba(0,0,0,0.08);}
button{cursor:pointer;transition:all 0.2s;}
button:hover{opacity:0.9;transform:scale(1.03);}
input, select{outline:none;}
</style>
</head>

<body class="flex flex-col h-screen">

<header class="text-3xl text-pink-700">Mathmate AI ✏️</header>

<!-- 로그인 화면 -->
<div id="login-overlay" class="fixed inset-0 bg-white/90 flex flex-col justify-center items-center z-50 space-y-3">
  <h2 class="text-2xl font-bold text-pink-600 mb-2" style="font-family:'Playfair Display', serif;">닉네임을 입력해주세요</h2>
  <input id="nickname-input" class="px-4 py-2 rounded-xl border border-pink-200 w-64" placeholder="닉네임">
  <select id="grade" class="px-3 py-2 rounded-xl w-64">
    <option value="">학년 선택</option>
    <option value="1">고1</option>
    <option value="2">고2</option>
    <option value="3">고3</option>
  </select>
  <input id="unit" class="px-4 py-2 rounded-xl border border-pink-200 w-64" placeholder="현재 단원 입력">
  <input id="goalUni" class="px-4 py-2 rounded-xl border border-pink-200 w-64" placeholder="목표 대학 입력">
  <button onclick="doLogin()" class="bg-pink-600 text-white px-6 py-2 rounded-2xl font-bold w-64">입장하기</button>
</div>

<main class="flex-1 flex flex-col overflow-hidden p-4">

  <!-- 모드 & 말투 선택 -->
  <div class="flex gap-3 mb-3">
    <select id="modeSelect" class="px-3 py-2 rounded-xl">
      <option value="내신">내신 대비</option>
      <option value="수능">수능 대비</option>
      <option value="MIT">MIT 대비</option>
      <option value="Stanford">Stanford 대비</option>
      <option value="SAT/AP">SAT/AP Calculus BC</option>
    </select>
    <select id="tone" class="px-3 py-2 rounded-xl">
      <option value="친구">친구 모드</option>
      <option value="블레어">블레어 월도프 모드</option>
      <option value="헤르미온느">헤르미온느 모드</option>
      <option value="레오나르도">레오나르도 모드</option>
    </select>
  </div>

  <!-- 채팅창 -->
  <div id="chat" class="flex-1 overflow-y-auto p-3 space-y-3 border rounded-2xl bg-ivory"></div>

  <!-- 질문 + 이미지 업로드 -->
  <div class="flex gap-2 mt-3">
    <input type="file" id="image-input" accept="image/*" class="rounded-xl border border-pink-200 px-2 py-1">
    <input id="input" placeholder="수학 질문 입력..." class="flex-1 px-3 py-2 border rounded-xl border-pink-200">
    <button id="send-btn" class="bg-pink-600 text-white px-4 py-2 rounded-2xl font-bold">전송</button>
  </div>
</main>

<script>
const API_KEY = "AIzaSyDbyuE2kG7Kce7vZuMDU6bFuNHkIdr0EUM";
let chatHistory=[], user={};

/* ================= LOGIN ================= */
function doLogin(){
  const nickname=document.getElementById("nickname-input").value.trim();
  const grade=document.getElementById("grade").value;
  const unit=document.getElementById("unit").value.trim();
  const goalUni=document.getElementById("goalUni").value.trim();
  if(!nickname||!grade||!unit||!goalUni) return alert("모든 항목을 입력해주세요!");
  user={nickname,grade,unit,goalUni};
  document.getElementById("login-overlay").style.display="none";
  addAI(`반가워 ${nickname}님! 🎓 학년: ${grade}, 단원: ${unit}, 목표: ${goalUni} 설정 완료!`);
}

/* ================= UI ================= */
function addUser(text){
  const div=document.createElement("div");
  div.className="flex justify-end";
  div.innerHTML=`<div class="user-bubble">${text}</div>`;
  document.getElementById("chat").appendChild(div);
  scrollChat();
}
function addAI(text){
  const div=document.createElement("div");
  div.className="flex justify-start";
  const inner=document.createElement("div");
  inner.className="ai-bubble";
  inner.innerHTML=marked.parse(text);
  div.appendChild(inner);
  document.getElementById("chat").appendChild(div);
  MathJax.typesetPromise([inner]);
  scrollChat();
}
function scrollChat(){const c=document.getElementById("chat");c.scrollTo({top:c.scrollHeight,behavior:"smooth"});}

/* ================= IMAGE ================= */
let selectedImage=null;
document.getElementById("image-input").addEventListener("change",e=>{
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{selectedImage=e.target.result.split(",")[1];}
  reader.readAsDataURL(file);
});

/* ================= GEMINI API ================= */
async function askGemini(prompt,imageBase64){
  const mode=document.getElementById("modeSelect").value;
  const tone=document.getElementById("tone").value;
  const systemPrompt=`너는 고등학생용 사고력 중심 수학 AI 튜터야.
사용자: ${user.nickname}, 학년:${user.grade}, 단원:${user.unit}, 목표:${user.goalUni}, 모드:${mode}, 말투:${tone}.
규칙:
1. 수식은 반드시 LaTeX($...$, $$...$$)를 사용하여 깔끔하게 렌더링하세요.
2. 친근하면서도 수학적 전문성을 유지하세요.
3. 정답을 바로 주기보다 해결의 실마리를 먼저 제시하세요.
4. 답변 마지막엔 반드시 질문과 관련된 '도전적인 생각할 거리'를 1개 던지세요.
5. 이전 대화 내용을 기억하여 맥락에 맞게 답변하세요.
6. 정의→구조→일반화→확장→사고 유도
7. 정답 바로 제공 X
8. THINKING NOTE 형식
9. 이미지 분석 포함 가능`;
  const currentPrompt=chatHistory.length===0?`[시스템:${systemPrompt}] ${prompt}`:prompt;
  chatHistory.push({role:"user",parts:[{text:currentPrompt}]});

  try{
    const res=await fetch("https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key="+API_KEY,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:chatHistory})
    });
    const data=await res.json();
    const aiText=data.candidates[0].content.parts[0].text;
    chatHistory.push({role:"model",parts:[{text:aiText}]});
    return aiText;
  }catch(e){return "⚠️ 오류 발생! API 키 확인 필요";}
}

/* ================= FORM ================= */
document.getElementById("send-btn").onclick=async()=>{
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text&&!selectedImage) return;
  addUser(text);
  input.value="";
  const tempImg=selectedImage;
  selectedImage=null;
  const res=await askGemini(text,tempImg);
  addAI(res);
};
</script>
</body>
</html>
